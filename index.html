<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DESERT STORM — Hi8 Camcorder Effect</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="scanline-overlay"></div>
<div class="noise-overlay"></div>

<header>
  <div class="header-left">
    <div class="rec-dot"></div>
    <span class="rec-label">REC</span>
  </div>
  <div class="header-title">
    <span class="title-main">DESERT STORM</span>
    <span class="title-sub">Hi8 · CAMCORDER · EFFECT PROCESSOR</span>
  </div>
  <div class="header-right">
    <span class="timestamp" id="ts">02. 08. 90 &nbsp; 10:44:00</span>
  </div>
</header>

<main>

  <!-- DROP ZONE -->
  <section class="drop-zone" id="dropZone">
    <div class="drop-inner">
      <div class="drop-icon">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <rect x="6" y="10" width="36" height="28" rx="2" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="32" cy="18" r="3" stroke="currentColor" stroke-width="1.5"/>
          <path d="M6 30 L16 22 L24 28 L32 22 L42 30" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M24 42 L24 36 M20 39 L24 43 L28 39" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <p class="drop-title">DROP IMAGE OR VIDEO HERE</p>
      <p class="drop-sub">JPG · PNG · MP4 · MOV · WEBM</p>
      <label class="btn-upload" for="fileInput">SELECT FILE</label>
      <input type="file" id="fileInput" accept="image/*,video/*" hidden>
    </div>
  </section>

  <!-- WORKSPACE -->
  <section class="workspace" id="workspace" style="display:none">
    <div class="canvas-wrap">
      <canvas id="outputCanvas"></canvas>
      <div class="canvas-hud">
        <span class="hud-left">Hi8 · SP MODE</span>
        <span class="hud-right" id="hudTime">02. 08. 90 &nbsp; 10:44:00</span>
      </div>
      <!-- video playback controls -->
      <div class="video-controls" id="videoControls" style="display:none">
        <button id="btnPlayPause" class="vc-btn">▶ PLAY</button>
        <div class="vc-progress">
          <div class="vc-bar" id="vcBar"></div>
        </div>
        <span class="vc-time" id="vcTime">0:00</span>
      </div>
    </div>

    <div class="controls-panel">
      <div class="controls-header">
        <span>TAPE PARAMETERS</span>
        <button class="btn-reset" id="btnReset">RESET</button>
      </div>

      <div class="sliders">
        <div class="slider-row">
          <label>ORANGE CAST</label>
          <input type="range" id="orange" min="0" max="100" value="75">
          <span class="sv" id="sv-orange">75</span>
        </div>
        <div class="slider-row">
          <label>BLOWN HIGHLIGHTS</label>
          <input type="range" id="blown" min="0" max="100" value="60">
          <span class="sv" id="sv-blown">60</span>
        </div>
        <div class="slider-row">
          <label>LIFTED BLACKS</label>
          <input type="range" id="lift" min="0" max="100" value="55">
          <span class="sv" id="sv-lift">55</span>
        </div>
        <div class="slider-row">
          <label>CHROMA SMEAR</label>
          <input type="range" id="smear" min="0" max="100" value="45">
          <span class="sv" id="sv-smear">45</span>
        </div>
        <div class="slider-row">
          <label>TAPE NOISE</label>
          <input type="range" id="noise" min="0" max="100" value="35">
          <span class="sv" id="sv-noise">35</span>
        </div>
        <div class="slider-row">
          <label>GENERATION LOSS</label>
          <input type="range" id="genloss" min="0" max="100" value="40">
          <span class="sv" id="sv-genloss">40</span>
        </div>
        <div class="slider-row">
          <label>LENS BLUR</label>
          <input type="range" id="blur" min="0" max="100" value="40">
          <span class="sv" id="sv-blur">40</span>
        </div>
        <div class="slider-row">
          <label>CAMERA SHAKE</label>
          <input type="range" id="shake" min="0" max="100" value="25">
          <span class="sv" id="sv-shake">25</span>
        </div>
        <div class="slider-row">
          <label>VIGNETTE</label>
          <input type="range" id="vignette" min="0" max="100" value="35">
          <span class="sv" id="sv-vignette">35</span>
        </div>
      </div>

      <div class="presets">
        <span class="presets-label">PRESETS</span>
        <button class="preset-btn" data-preset="gulf">GULF WAR</button>
        <button class="preset-btn" data-preset="mild">MILD TAPE</button>
        <button class="preset-btn" data-preset="heavy">HEAVY DUB</button>
        <button class="preset-btn" data-preset="clean">CLEAN Hi8</button>
      </div>

      <div class="actions">
        <button class="btn-export" id="btnExport">EXPORT FRAME</button>
        <button class="btn-new" id="btnNew">LOAD NEW FILE</button>
      </div>

      <div class="export-status" id="exportStatus"></div>
    </div>
  </section>

</main>

<footer>
  <span>Gulf War footage · 1990–1991 · Hi8 / Betacam SP · Multi-generation dub</span>
</footer>

<script src="effect.js"></script>
</body>
</html>
