<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Projects</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f5f5f3;
      --surface:   #ffffff;
      --border:    rgba(0,0,0,0.08);
      --border-md: rgba(0,0,0,0.13);
      --text:      #111110;
      --muted:     #888884;
      --accent:    #a51618;
      --toggle-bg: #e8e8e6;
      --toggle-active-bg: #111110;
      --toggle-active-text: #ffffff;
      --toggle-text: #666662;
      --shadow:    0 2px 12px rgba(0,0,0,0.07), 0 1px 3px rgba(0,0,0,0.04);
      --shadow-hover: 0 8px 28px rgba(0,0,0,0.11), 0 2px 6px rgba(0,0,0,0.06);
    }

    [data-theme="dark"] {
      --bg:        #111110;
      --surface:   #1c1c1a;
      --border:    rgba(255,255,255,0.07);
      --border-md: rgba(255,255,255,0.13);
      --text:      #f0f0ee;
      --muted:     #666662;
      --accent:    #ff5a4c;
      --toggle-bg: #2a2a28;
      --toggle-active-bg: #f0f0ee;
      --toggle-active-text: #111110;
      --toggle-text: #888884;
      --shadow:    0 2px 12px rgba(0,0,0,0.4), 0 1px 3px rgba(0,0,0,0.3);
      --shadow-hover: 0 8px 28px rgba(0,0,0,0.5), 0 2px 6px rgba(0,0,0,0.3);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', system-ui, sans-serif;
      transition: background 0.3s, color 0.2s;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ── */
    .page { max-width: 1100px; margin: 0 auto; padding: 3rem 2rem 5rem; }

    /* ── Header ── */
    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 3rem;
    }

    .header-left h1 {
      font-size: 1.6rem;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: var(--text);
      line-height: 1.2;
    }
    .header-left p {
      margin-top: 0.3rem;
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 300;
      letter-spacing: 0.01em;
    }

    /* ── Theme toggle ── */
    .theme-toggle {
      display: flex;
      background: var(--toggle-bg);
      border-radius: 9999px;
      padding: 3px;
      gap: 2px;
      flex-shrink: 0;
      margin-top: 4px;
    }
    .theme-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 5px 16px;
      border-radius: 9999px;
      font-size: 0.78rem;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      color: var(--toggle-text);
      transition: background 0.18s, color 0.18s;
      letter-spacing: 0.02em;
    }
    .theme-btn.active {
      background: var(--toggle-active-bg);
      color: var(--toggle-active-text);
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.25rem;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border-radius: 16px;
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform 0.2s cubic-bezier(0.34,1.3,0.64,1), box-shadow 0.2s, border-color 0.2s;
      cursor: pointer;
      text-decoration: none;
      display: block;
      color: inherit;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
      border-color: var(--border-md);
    }

    /* ── Preview window ── */
    .preview {
      position: relative;
      width: 100%;
      height: 200px;
      overflow: hidden;
      background: #e8e8e6;
    }

    /* iframe scaled down to fit the preview box */
    .preview iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 1280px;
      height: 800px;
      transform: scale(0.234375); /* 300 / 1280 */
      transform-origin: top left;
      border: none;
      pointer-events: none;
      user-select: none;
    }

    /* blurred edges vignette */
    .preview::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.18) 100%);
      pointer-events: none;
    }

    /* name overlay */
    .preview-name {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      letter-spacing: -0.01em;
      color: #fff;
      text-shadow:
        -1px -1px 0 rgba(0,0,0,0.9),
         1px -1px 0 rgba(0,0,0,0.9),
        -1px  1px 0 rgba(0,0,0,0.9),
         1px  1px 0 rgba(0,0,0,0.9),
         0 0 20px rgba(0,0,0,0.6);
      pointer-events: none;
      z-index: 2;
    }

    /* ── No‑script / load fallback for iframes ── */
    .preview-fallback {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      z-index: 0;
    }
  </style>
</head>
<body>
<div class="page">
  <header>
    <div class="header-left">
      <h1>Projects</h1>
    </div>
    <div class="theme-toggle" role="group" aria-label="Color theme">
      <button class="theme-btn active" id="btn-light" onclick="setTheme('light')">Light</button>
      <button class="theme-btn" id="btn-dark" onclick="setTheme('dark')">Dark</button>
    </div>
  </header>

  <div class="grid" id="grid"></div>
</div>

<script>
  /* ── Project list — edit this to add/remove entries ── */
  const projects = [
    {
      name: "Entomology ID",
      href: "./entomology.html",
    },
    {
      name: "Grades",
      href: "./grades/index.html",
    },
  ];

  function buildGrid() {
    const grid = document.getElementById('grid');
    projects.forEach(p => {
      const a = document.createElement('a');
      a.className = 'card';
      a.href = p.href;

      const preview = document.createElement('div');
      preview.className = 'preview';

      const fallback = document.createElement('div');
      fallback.className = 'preview-fallback';
      fallback.textContent = p.name;
      preview.appendChild(fallback);

      const iframe = document.createElement('iframe');
      iframe.src = p.href;
      iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin');
      iframe.setAttribute('loading', 'lazy');
      iframe.setAttribute('scrolling', 'no');
      iframe.setAttribute('tabindex', '-1');
      iframe.setAttribute('aria-hidden', 'true');
      iframe.title = p.name + ' preview';
      preview.appendChild(iframe);

      const nameEl = document.createElement('div');
      nameEl.className = 'preview-name';
      nameEl.textContent = p.name;
      preview.appendChild(nameEl);

      a.appendChild(preview);
      grid.appendChild(a);
    });
  }

  function setTheme(mode) {
    document.documentElement.setAttribute('data-theme', mode);
    document.getElementById('btn-light').classList.toggle('active', mode === 'light');
    document.getElementById('btn-dark').classList.toggle('active', mode === 'dark');
    localStorage.setItem('guide-theme', mode);
  }

  /* restore saved preference */
  const saved = localStorage.getItem('guide-theme');
  if (saved === 'dark') setTheme('dark');

  buildGrid();
</script>
</body>
</html>
